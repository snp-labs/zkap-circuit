name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop, "feature/**", "docs/**", "chore/**", "fix/**", "security/**"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Bump this token to invalidate Swatinem/rust-cache when stale entries cause
  # phantom dep-graph errors (e.g. "ark-serialize multiple instances" from a
  # cache built before a git+rev pin update). Local clean builds pass; bumping
  # here forces a fresh cache key on the next CI run.
  CACHE_BUST: "v2"

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # wasm_to_prove integration tests rebuild zkap-witness-wasm for
      # wasm32-unknown-unknown inside the test fixture, so the Test job
      # toolchain needs that target installed (the test sets
      # AR1CS_WITNESS_ARZKEY_PATH itself per-run).
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2
        with:
          tool: cargo-nextest
      # Workspace-wide test sweep on the `release-tests` custom profile,
      # defined in the root Cargo.toml as release optimization (LTO off) +
      # unwind panic. The mobile-targeted `[profile.release]` keeps
      # `panic = "abort"`, which Cargo does not propagate to test
      # binaries — `cargo test --release` therefore hits a
      # panic-strategy mismatch (deps=abort vs test crate=unwind). The
      # custom profile sidesteps that. Nextest's per-test process model
      # also eliminates env-variable races between parallel tests
      # (e.g. SOURCE_DATE_EPOCH in crates/cli/tests/manifest_golden.rs).
      - run: cargo nextest run --profile ci --cargo-profile release-tests --workspace

  build:
    name: Build (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo build --release --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo fmt --all -- --check

  examples:
    name: Examples (compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo build --examples --workspace

  feature-matrix:
    name: Feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      # ark-utils: 4 combos (H4)
      - name: ark-utils | no-default-features
        run: cargo check -p ark-utils --no-default-features
      - name: ark-utils | wire
        run: cargo check -p ark-utils --no-default-features --features wire
      - name: ark-utils | r1cs
        run: cargo check -p ark-utils --no-default-features --features r1cs
      - name: ark-utils | r1cs,wire,field-serde,io (full)
        run: cargo check -p ark-utils --no-default-features --features r1cs,wire,field-serde,io
      # gadget: 3 combos (H4)
      - name: gadget | crypto
        run: cargo check -p gadget --no-default-features --features crypto
      - name: gadget | crypto,base64
        run: cargo check -p gadget --no-default-features --features crypto,base64
      - name: gadget | crypto,base64,rsa (full)
        run: cargo check -p gadget --no-default-features --features crypto,base64,rsa
      # zkap-service: 2 combos — replaces former single-combo features job (H4)
      - name: zkap-service | no-default-features
        run: cargo check -p zkap-service --no-default-features
      - name: zkap-service | default (proof)
        run: cargo check -p zkap-service

  wasm32-build:
    # Kept alongside `generate-setup-smoke`: this job is the fast-signal lane for
    # wasm32 compile regressions (synthetic dummy .arzkey, ~seconds with cache).
    # `generate-setup-smoke` is the full-chain lane (real arzkey + wasm-opt +
    # size/export/pair gates, ~30s+). Two lanes intentionally cover different
    # regression classes — see `.omc/plans/2026-05-11-generate-setup-workflow-migration.html`.
    name: wasm32 build (zkap-witness-wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown
      # build.rs requires AR1CS_WITNESS_ARZKEY_PATH for wasm32 target to embed
      # the ar1cs_blake3 pair-identity constant. In CI we provide a synthetic
      # 48-byte arzkey (magic + zero blake3) so the build compiles cleanly;
      # the embedded constant is a CI-only placeholder — production wasm builds
      # must supply the real paired .arzkey via this env var.
      - name: Create synthetic CI arzkey
        run: |
          python3 -c "
          magic = b'ARZKEY'
          header = magic + b'\x01' + b'\x00' + b'\x00' * 8 + b'\x00' * 32
          with open('/tmp/ci_dummy.arzkey', 'wb') as f:
              f.write(header)
          print('Created synthetic arzkey:', len(header), 'bytes')
          "
      - name: Build zkap-witness-wasm (wasm32-unknown-unknown)
        run: cargo build -p zkap-witness-wasm --target wasm32-unknown-unknown --release
        env:
          AR1CS_WITNESS_ARZKEY_PATH: /tmp/ci_dummy.arzkey
      - name: Report wasm artifact size
        run: |
          WASM=target/wasm32-unknown-unknown/release/zkap_witness_wasm.wasm
          SIZE=$(wc -c < "$WASM" | tr -d ' ')
          echo "wasm size: ${SIZE} bytes"
          # Hard gate: must be under 8 MiB (matches build-wasm.sh)
          python3 - <<EOF
          size = ${SIZE}
          limit = 8 * 1024 * 1024
          mib = size / 1048576
          print(f"wasm size: {size} bytes ({mib:.3f} MiB) / limit 8 MiB")
          if size > limit:
              raise SystemExit(f"wasm size {size} bytes exceeds 8 MiB gate ({limit} bytes)")
          print(f"Size gate OK")
          EOF

  generate-setup-smoke:
    # Runs the same invocation as release.yml's generate-keys job at PR
    # time, regression-guarding the full chain:
    # cli::generate_setup → zkap_service::setup → arzkey rename → cargo
    # wasm32 build → wasm-opt → size gate → export verification →
    # pairing verification. The previous name `generate-crs-smoke`
    # covered only `generate_crs` and did not exercise the wasm side.
    # See `.omc/plans/2026-05-11-generate-setup-workflow-migration.html`.
    #
    # The `circuit/integration-tests` feature on `cargo run` mirrors the
    # release-job invocation form (Phase 5 / C13). The feature itself is
    # a marker that gates `crates/circuit/tests/groth16_integration.rs`,
    # not runtime code, so it has no effect on the bin's output — but
    # keeping the form aligned means a regression in either workflow
    # surfaces in the other.
    #
    # Phase 7 / P7-ci-concurrency (Phase 6 critic M2 + WM (a)(b)):
    # - `concurrency:` cancels in-progress runs of this job for the
    #   same ref so rapid pushes don't queue ~22s × ~1 GiB-on-disk
    #   smoke runs that the next push would invalidate anyway.
    # - `timeout-minutes:` gives the job a hard ceiling so a hung
    #   `cargo run` (e.g. arzkey writer stalls, ar1cs panics in a
    #   way that doesn't drop the process) cannot consume a full
    #   6-hour runner slot.
    # - The size cap on `/tmp/ci-crs` is a defence-in-depth check
    #   against an `n,k` regression that explodes pk.arzkey: the
    #   Phase 6 measurement at the committed shape was ~1 GiB, so
    #   2 GiB is a 2× safety margin that still catches a
    #   parameter-blow-up well before the runner runs out of disk.
    #   The new wasm artifact is ≤ 8 MiB and does not change the disk math.
    name: generate_setup (PR smoke)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: generate-setup-smoke-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Install binaryen
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - name: Run generate_setup against example.json
        run: |
          mkdir -p /tmp/ci-crs
          cargo run --release --features circuit/integration-tests \
            --bin generate_setup -- \
            --config example.json --output /tmp/ci-crs \
            --circuit-id zkap-main-v1
      - name: Verify 7-file V1 layout
        run: |
          set -euo pipefail
          for f in circuit.arzkey pk.key vk.key pvk.key \
                   Groth16Verifier.sol config.json zkap_witness_wasm.opt.wasm; do
            test -s "/tmp/ci-crs/$f" \
              || { echo "ERROR: missing/empty /tmp/ci-crs/$f"; exit 1; }
          done
          grep -q "library Groth16Verifier {" /tmp/ci-crs/Groth16Verifier.sol
      - name: Verify pair contract
        # Same verification as release.yml Step 1 — keeps both workflows in sync.
        run: |
          set -euo pipefail
          ARZKEY_HEX=$(xxd -s 16 -l 32 -p /tmp/ci-crs/circuit.arzkey | tr -d '\n')
          if ! LC_ALL=C grep -aFq "$(printf %s "${ARZKEY_HEX}" | xxd -r -p)" \
               /tmp/ci-crs/zkap_witness_wasm.opt.wasm; then
            echo "ERROR: wasm not paired with circuit.arzkey"; exit 1
          fi
          echo "pair contract verified (ar1cs_blake3=${ARZKEY_HEX})"
      - name: CRS artifact size cap
        # Phase 7 / P7-ci-concurrency (WM (b)): defence-in-depth
        # against an `n,k` regression that explodes pk.arzkey. The
        # Phase 6 measurement at the committed shape was ~1 GiB, so
        # 2 GiB (2 097 152 KiB) is a 2× safety margin that still
        # catches a parameter-blow-up well before the runner runs
        # out of disk.
        run: |
          set -euo pipefail
          USED_KIB=$(du -sk /tmp/ci-crs | awk '{print $1}')
          LIMIT_KIB=2097152  # 2 GiB
          echo "/tmp/ci-crs total: ${USED_KIB} KiB / limit ${LIMIT_KIB} KiB"
          if [ "$USED_KIB" -gt "$LIMIT_KIB" ]; then
            echo "ERROR: /tmp/ci-crs exceeds 2 GiB cap (${USED_KIB} KiB > ${LIMIT_KIB} KiB)"
            exit 1
          fi

  rustdoc:
    # Phase 8 / P8-arkutils-doc-link-audit (Phase 7 critic MINOR #3) seeded
    # this gate on `ark-utils`. Phase 9 / P9-gadget-rustdoc-audit (Phase 8
    # critic MINOR #3) extends it to `gadget`, whose H5-staged-4 sweep
    # (Phase 8 `c630dd78`) added 213 fresh doc strings without `cargo doc`
    # validation. Both crates carry
    # `#![deny(rustdoc::broken_intra_doc_links)]` and
    # `#![deny(rustdoc::invalid_html_tags)]`, so any unresolved
    # `[`foo`]` link or stray `Foo<T>` (interpreted as HTML) fails
    # the doc build. Multiple feature configs are exercised because a
    # link that resolves under one feature set can break under the
    # other (e.g. `field-serde`-gated re-exports in `ark-utils`,
    # `rsa`/`base64`-gated submodules in `gadget`). The default build
    # is the canonical one; the `--features full`/`--all-features`
    # build also documents the gated items.
    name: Rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Rustdoc (ark-utils, default features)
        run: cargo doc -p ark-utils --no-deps
      - name: Rustdoc (ark-utils, all features)
        run: cargo doc -p ark-utils --no-deps --all-features
      - name: Rustdoc (gadget, default features)
        run: cargo doc -p gadget --no-deps
      # Phase 9 / P9-gadget-rustdoc-matrix-extension (Phase 9 critic
      # MINOR #1): without partial-feature coverage, a `[`foo`]` link
      # gated by feature A that resolves to an item gated by feature B
      # would silently break under `--features A` alone (default + full
      # both pass: default has no docs, full has both gates open). The
      # combinations below mirror the `feature-matrix` job (lines 98-103)
      # so partial-feature broken links surface at PR time.
      - name: Rustdoc (gadget, hashes-poseidon)
        run: cargo doc -p gadget --no-deps --features hashes-poseidon
      - name: Rustdoc (gadget, anchor)
        run: cargo doc -p gadget --no-deps --features anchor
      - name: Rustdoc (gadget, rsa)
        run: cargo doc -p gadget --no-deps --features rsa
      - name: Rustdoc (gadget, crypto bundle)
        run: cargo doc -p gadget --no-deps --features crypto
      - name: Rustdoc (gadget, full feature)
        run: cargo doc -p gadget --no-deps --features full
      - name: Rustdoc (circuit)
        run: cargo doc -p circuit --no-deps

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
