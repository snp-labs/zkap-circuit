name: Deploy zkup to proof worker server (Develop)

permissions:
  contents: write
  pull-requests: write
  id-token: write

on:
  workflow_dispatch: # 수동 실행만 가능
    inputs:
      version:
        description: '배포할 버전 (예: 0.0.1)'
        required: true
        type: string

jobs:
  deploy-to-vm:
    name: Deploy to VM
    runs-on: self-hosted
    environment: development
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
          audience: ${{ vars.GCP_WIF_AUDIENCE }}
          token_format: "access_token"
          create_credentials_file: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy from bucket to VM
        run: |
          BUCKET_NAME=$(echo "${{ vars.GCP_BUCKET_NAME }}" | tr -d ' \n\r')
          VM_INSTANCE=$(echo "${{ vars.GCP_VM_INSTANCE_NAME }}" | tr -d ' \n\r')
          VM_ZONE=$(echo "${{ vars.GCP_VM_ZONE }}" | tr -d ' \n\r')
          VERSION="${{ inputs.version }}"
          FOLDER_NAME="zkup_${VERSION}"
          
          echo "버킷에서 파일을 VM으로 배포합니다..."
          echo "버킷: $BUCKET_NAME"
          echo "VM 인스턴스: $VM_INSTANCE"
          echo "VM Zone: $VM_ZONE"
          echo "버전: $VERSION"
          echo "폴더명: $FOLDER_NAME"
          
          # VM의 zone 가져오기
          VM_ZONE=$(gcloud compute instances describe "$VM_INSTANCE" --format="get(zone)" | awk -F'/' '{print $NF}')
          echo "VM Zone: $VM_ZONE"
          
          # 임시 디렉토리에 버킷에서 파일 다운로드
          TEMP_DIR=$(mktemp -d)
          echo "임시 디렉토리: $TEMP_DIR"
          
          echo "버킷에서 파일 다운로드 중..."
          gcloud storage cp -r "gs://$BUCKET_NAME/$FOLDER_NAME" "$TEMP_DIR/"
          
          if [ ! -d "$TEMP_DIR/$FOLDER_NAME" ]; then
            echo "오류: 버킷에서 폴더를 찾을 수 없습니다: $FOLDER_NAME"
            exit 1
          fi
          
          echo "다운로드 완료. VM으로 전송 중..."
          
          # VM에 ~/zkup 디렉토리 생성 (존재하지 않으면)
          echo "VM에 zkup 디렉토리 확인 및 생성 중..."
          gcloud compute ssh "$VM_INSTANCE" --zone="$VM_ZONE" --command="mkdir -p ~/zkup" --quiet
          
          # 파일을 VM으로 전송
          echo "파일을 VM으로 전송 중..."
          if ! gcloud compute scp --recurse --zone="$VM_ZONE" "$TEMP_DIR/$FOLDER_NAME" "$VM_INSTANCE:~/zkup/"; then
            echo "오류: VM으로 파일 전송 실패"
            exit 1
          fi
          
          echo "VM 배포 완료"
          # 전송 확인
          echo "전송된 파일 확인 중..."
          if ! gcloud compute ssh "$VM_INSTANCE" --zone="$VM_ZONE" --command="ls -la ~/zkup/$FOLDER_NAME" --quiet; then
            echo "경고: 전송 확인 실패 (파일은 전송되었을 수 있음)"
          fi
          
          # 임시 디렉토리 정리
          rm -rf "$TEMP_DIR"
          echo "임시 디렉토리 정리 완료"

  slack-notify-success:
    runs-on: self-hosted
    environment: development
    needs: [deploy-to-vm]
    if: success()
    steps:
      - name: Prepare Slack payload
        id: slack-payload
        env:
          VERSION: ${{ inputs.version }}
          VM_INSTANCE: ${{ vars.GCP_VM_INSTANCE_NAME }}
          BUCKET_NAME: ${{ vars.GCP_BUCKET_NAME }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # JSON payload 생성
          PAYLOAD=$(node -e "
            const version = process.env.VERSION || '';
            const vmInstance = process.env.VM_INSTANCE || '';
            const bucketName = process.env.BUCKET_NAME || '';
            const runId = process.env.RUN_ID || '';
            const text = \`✅ [개발] zkup VM 배포 완료\\n- 버전: \${version}\\n- VM 인스턴스: \${vmInstance}\\n- 버킷: \${bucketName}\\n- 배포 위치: ~/zkup/zkup_\${version}\\n- 배포가 성공적으로 완료되었습니다.\`;
            const payload = {
              text: '[개발] zkup VM 배포 알림',
              blocks: [
                {
                  type: 'section',
                  text: {
                    type: 'mrkdwn',
                    text: text
                  },
                  accessory: {
                    type: 'button',
                    text: {
                      type: 'plain_text',
                      text: '워크플로우 확인하기',
                      emoji: true
                    },
                    value: 'actions',
                    url: \`https://github.com/baerae-zkap/zkup/actions/runs/\${runId}\`,
                    action_id: 'workflow_check'
                  }
                }
              ]
            };
            console.log(JSON.stringify(payload));
          ")

          echo "payload<<EOF" >> $GITHUB_OUTPUT
          echo "$PAYLOAD" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Greet the reader
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: ${{ steps.slack-payload.outputs.payload }}

  slack-notify-failure:
    runs-on: self-hosted
    environment: development
    needs: [deploy-to-vm]
    if: failure()
    steps:
      - name: Prepare Slack failure payload
        id: slack-failure-payload
        env:
          VERSION: ${{ inputs.version }}
          VM_INSTANCE: ${{ vars.GCP_VM_INSTANCE_NAME }}
          BUCKET_NAME: ${{ vars.GCP_BUCKET_NAME }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # JSON payload 생성
          PAYLOAD=$(node -e "
            const version = process.env.VERSION || '';
            const vmInstance = process.env.VM_INSTANCE || '';
            const bucketName = process.env.BUCKET_NAME || '';
            const runId = process.env.RUN_ID || '';
            const text = \`❌ [개발] zkup VM 배포 실패\\n- 버전: \${version}\\n- VM 인스턴스: \${vmInstance}\\n- 버킷: \${bucketName}\\n- 배포 작업이 실패했습니다.\\n- 상세 내용은 GitHub Actions에서 확인해주세요.\`;
            const payload = {
              text: '[개발] zkup VM 배포 실패 알림',
              blocks: [
                {
                  type: 'section',
                  text: {
                    type: 'mrkdwn',
                    text: text
                  },
                  accessory: {
                    type: 'button',
                    text: {
                      type: 'plain_text',
                      text: '워크플로우 확인하기',
                      emoji: true
                    },
                    value: 'actions',
                    url: \`https://github.com/baerae-zkap/zkup/actions/runs/\${runId}\`,
                    action_id: 'workflow_check'
                  }
                }
              ]
            };
            console.log(JSON.stringify(payload));
          ")

          echo "payload<<EOF" >> $GITHUB_OUTPUT
          echo "$PAYLOAD" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: ${{ steps.slack-failure-payload.outputs.payload }}
