[package]
name = "zkap-service"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Service layer for ZK proof generation and key management"
repository = "https://github.com/snp-labs/zkap-circuit"
keywords = ["zk", "proof-generation", "groth16"]
categories = ["cryptography"]

[dependencies]
gadget = { workspace = true, default-features = false, features = ["crypto", "base64", "rsa"] }
circuit = { workspace = true }
ark-utils = { workspace = true, features = ["field-serde", "io", "evm-codegen"] }

regex = { workspace = true }
thiserror = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }

ark-groth16           = { workspace = true }
ark-ec                = { workspace = true }
ark-ff                = { workspace = true }
ark-poly              = { workspace = true }
ark-r1cs-std          = { workspace = true }
ark-relations         = { workspace = true }
ark-std               = { workspace = true }
ark-crypto-primitives = { workspace = true }
ark-bn254             = { workspace = true }
ark-ed-on-bn254       = { workspace = true }
ark-serialize         = { workspace = true }
memmap2               = { workspace = true }
once_cell             = { workspace = true }

num         = { workspace = true }
num-integer = { workspace = true }
num-bigint  = { workspace = true }

num-traits  = { workspace = true }
log = { workspace = true }

blake2 = { workspace = true }
hex    = { workspace = true }
rand   = { workspace = true }
sha2   = { workspace = true }
jsonwebtoken = { workspace = true }

[features]
default = []