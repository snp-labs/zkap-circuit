name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop, "feature/**", "docs/**", "chore/**", "fix/**", "security/**"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Bump this token to invalidate Swatinem/rust-cache when stale entries cause
  # phantom dep-graph errors (e.g. "ark-serialize multiple instances" from a
  # cache built before a git+rev pin update). Local clean builds pass; bumping
  # here forces a fresh cache key on the next CI run.
  CACHE_BUST: "v2"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo check --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # wasm_to_prove integration tests rebuild zkap-witness-wasm for
      # wasm32-unknown-unknown inside the test fixture, so the Test job
      # toolchain needs that target installed (the test sets
      # AR1CS_WITNESS_ARZKEY_PATH itself per-run).
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      # Workspace-wide test sweep on the `release-tests` custom profile,
      # defined in the root Cargo.toml as release optimization + unwind
      # panic. The mobile-targeted `[profile.release]` keeps
      # `panic = "abort"`, which Cargo does not propagate to test
      # binaries — `cargo test --release` therefore hits a
      # panic-strategy mismatch (deps=abort vs test crate=unwind). The
      # custom profile sidesteps that while preserving release-level
      # runtime speed for the heavier ZK tests.
      - run: cargo test --profile release-tests --workspace
      # Explicitly name the L1 golden gate so failures are easy to identify.
      # The byte-gate sweep above already covers this target via
      # `cargo test --profile release-tests`. The named step below
      # provides a clear CI signal and runs only fast tiers (B/C/D/E);
      # Tier A F2/F3 are `#[ignore]`-d (~120s each) and will NOT run
      # here — invoke with `-- --include-ignored` explicitly. Kept on
      # `--profile release-tests` so it reuses the workspace sweep's
      # incremental cache instead of rebuilding under a separate
      # profile.
      - name: L1 byte-gate (P0-A goldens)
        run: cargo test --profile release-tests -p zkap-service --test l3_byte_gate

  build:
    name: Build (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo build --release --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo fmt --all -- --check

  examples:
    name: Examples (compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo build --examples --workspace

  feature-matrix:
    name: Feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      # ark-utils: 4 combos (H4)
      - name: ark-utils | no-default-features
        run: cargo check -p ark-utils --no-default-features
      - name: ark-utils | wire
        run: cargo check -p ark-utils --no-default-features --features wire
      - name: ark-utils | r1cs
        run: cargo check -p ark-utils --no-default-features --features r1cs
      - name: ark-utils | r1cs,wire,field-serde,io (full)
        run: cargo check -p ark-utils --no-default-features --features r1cs,wire,field-serde,io
      # gadget: 3 combos (H4)
      - name: gadget | crypto
        run: cargo check -p gadget --no-default-features --features crypto
      - name: gadget | crypto,base64
        run: cargo check -p gadget --no-default-features --features crypto,base64
      - name: gadget | crypto,base64,rsa (full)
        run: cargo check -p gadget --no-default-features --features crypto,base64,rsa
      # zkap-service: 2 combos — replaces former single-combo features job (H4)
      - name: zkap-service | no-default-features
        run: cargo check -p zkap-service --no-default-features
      - name: zkap-service | default (proof)
        run: cargo check -p zkap-service

  wasm32-build:
    name: wasm32 build (zkap-witness-wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown
      # build.rs requires AR1CS_WITNESS_ARZKEY_PATH for wasm32 target to embed
      # the ar1cs_blake3 pair-identity constant. In CI we provide a synthetic
      # 48-byte arzkey (magic + zero blake3) so the build compiles cleanly;
      # the embedded constant is a CI-only placeholder — production wasm builds
      # must supply the real paired .arzkey via this env var.
      - name: Create synthetic CI arzkey
        run: |
          python3 -c "
          magic = b'ARZKEY'
          header = magic + b'\x01' + b'\x00' + b'\x00' * 8 + b'\x00' * 32
          with open('/tmp/ci_dummy.arzkey', 'wb') as f:
              f.write(header)
          print('Created synthetic arzkey:', len(header), 'bytes')
          "
      - name: Build zkap-witness-wasm (wasm32-unknown-unknown)
        run: cargo build -p zkap-witness-wasm --target wasm32-unknown-unknown --release
        env:
          AR1CS_WITNESS_ARZKEY_PATH: /tmp/ci_dummy.arzkey
      - name: Report wasm artifact size
        run: |
          WASM=target/wasm32-unknown-unknown/release/zkap_witness_wasm.wasm
          SIZE=$(wc -c < "$WASM" | tr -d ' ')
          echo "wasm size: ${SIZE} bytes"
          # Hard gate: must be under 8 MiB (matches build-wasm.sh)
          python3 - <<EOF
          size = ${SIZE}
          limit = 8 * 1024 * 1024
          mib = size / 1048576
          print(f"wasm size: {size} bytes ({mib:.3f} MiB) / limit 8 MiB")
          if size > limit:
              raise SystemExit(f"wasm size {size} bytes exceeds 8 MiB gate ({limit} bytes)")
          print(f"Size gate OK")
          EOF

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
