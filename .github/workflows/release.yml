name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        type: string

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Enforce main branch for manual dispatch
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "ERROR: Releases can only be triggered from the main branch."
          exit 1

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid version format: $VERSION (expected x.y.z)"
            exit 1
          fi

  test:
    name: Test
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --release --workspace

  generate-keys:
    # Phase 8 / P8-release-yml-symmetry (Phase 7 critic MINOR #4):
    # mirror the defence-in-depth guards from `ci.yml`'s
    # `generate-crs-smoke` job onto the tag-cut path that emits the
    # actual release artifacts. tag-cut is precisely where an
    # n,k-regression that explodes pk.arzkey would do the most damage
    # (release runner exhaustion, partial artifact upload), so the
    # guards belong here at least as much as on the PR-side smoke.
    # - `concurrency:` cancels superseded runs of this job for the
    #   same ref so a re-tagged release (or a `workflow_dispatch`
    #   re-trigger) doesn't queue ~22s × ~1 GiB-on-disk runs that
    #   the next push would invalidate anyway.
    # - `timeout-minutes:` matches `ci.yml`'s 10-minute ceiling so a
    #   hung `cargo run` cannot consume a full 6-hour runner slot.
    # - The size cap on `output/keys` is the same 2 GiB ceiling
    #   `ci.yml` enforces (Phase 6 measurement at the committed
    #   shape was ~977 MiB, leaving a 2× safety margin) — a
    #   parameter blow-up surfaces here before the artifact upload
    #   step partially consumes runner disk.
    name: Generate Proving Keys
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: generate-keys-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      # Phase 9 follow-up: replace generate_crs (legacy 6-file output) with
      # generate_setup (V1 7-file output incl. paired wasm). The wasm artifact
      # is required for the prove path; without it, the release tarball is
      # incomplete and consumers must build wasm separately (and end up with
      # a dummy-arzkey-paired wasm that aborts at runtime).
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install binaryen (wasm-opt)
        # ubuntu-latest does not ship binaryen by default. apt cache is
        # refreshed by the GitHub-hosted runner ~24h; package fetch is ~10s.
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Generate CRS + wasm bundle
        run: cargo run --release --features circuit/integration-tests
          --bin generate_setup --
          --config example.json --output output/keys

      - name: Verify pair contract
        # arzkey bytes 16..48 == wasm.embedded_ar1cs_blake3 (generate_setup
        # already prints the same hex to stdout, but we re-verify here for
        # release-path evidence).
        run: |
          set -euo pipefail
          ARZKEY_HEX=$(xxd -s 16 -l 32 -p output/keys/circuit.arzkey | tr -d '\n')
          test "${#ARZKEY_HEX}" -eq 64 || { echo "ERROR: arzkey blake3 length"; exit 1; }
          if ! LC_ALL=C grep -aFq "$(printf %s "${ARZKEY_HEX}" | xxd -r -p)" \
               output/keys/zkap_witness_wasm.opt.wasm; then
            echo "ERROR: wasm does not contain the arzkey ar1cs_blake3 bytes"
            exit 1
          fi
          echo "pair contract verified (ar1cs_blake3=${ARZKEY_HEX})"

      - name: CRS artifact size cap
        # Phase 8 / P8-release-yml-symmetry (mirrors `ci.yml`
        # `generate-crs-smoke` size cap). 2 GiB (2 097 152 KiB) is a
        # 2× safety margin over the Phase 6 measurement (~977 MiB)
        # at the committed `n=6,k=3,tree_height=4` shape. Catches a
        # parameter blow-up here, before the upload-artifact step
        # silently truncates or the runner runs out of disk.
        run: |
          set -euo pipefail
          USED_KIB=$(du -sk output/keys | awk '{print $1}')
          LIMIT_KIB=2097152  # 2 GiB
          echo "output/keys total: ${USED_KIB} KiB / limit ${LIMIT_KIB} KiB"
          if [ "$USED_KIB" -gt "$LIMIT_KIB" ]; then
            echo "ERROR: output/keys exceeds 2 GiB cap (${USED_KIB} KiB > ${LIMIT_KIB} KiB)"
            exit 1
          fi

      - name: Upload keys
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: proving-keys
          path: output/keys/
          if-no-files-found: error

  release:
    name: Create Release
    needs: [validate, generate-keys]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*
