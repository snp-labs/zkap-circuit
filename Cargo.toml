[workspace]
resolver = "3"
members = [
    "bindings/napi",
    "bindings/uniffi",
    "bindings/wasm",

    "crates/circuit",
    "crates/gadget",
    "crates/service",
    "crates/test",
]

[workspace.dependencies]
gadget                    = { path = "crates/gadget", default-features = false }
circuit                   = { path = "crates/circuit" }
zkpasskey-service         = { path = "crates/service" }

thiserror = { version = "2.0.12" }
serde = { version = "1.0.227", features = ["derive"] }
ark-groth16 = { version = "0.5.0" }
ark-ec = { version = "0.5.0" }
ark-ff = { version = "0.5.0" }
ark-poly = { version = "0.5.0" }
ark-r1cs-std = { version = "0.5.0" }
ark-relations = { version = "0.5.0" }
ark-std = { version = "0.5.0" }
ark-crypto-primitives = { version = "0.5.0" }
ark-bn254 = { version = "0.5.0" }
ark-ed-on-bn254 = { version = "0.5.0" }
ark-serialize = { version = "0.5.0" }
memmap2 = { version = "0.9.8" }
once_cell = { version = "1.21.3" }
base64 = { version = "0.22.1" }
derivative = { version = "2.2.0" }
regex = { version = "1.11.1" }
rsa = { version = "0.9.10" }
num = { version = "0.4" }
num-integer = { version = "0.1.46" }
num-bigint = { version = "0.4.6" }
num-traits = { version = "0.2.19" }
blake2 = { version = "0.10" }
dotenvy = { version = "0.15" }
hex = { version = "0.4" }
rand = { version = "0.8" }
sha2 = { version = "0.10" }
jsonwebtoken = { version = "10", features = ["aws_lc_rs"] }

napi = { version = "3.3.0" }
napi-derive = { version = "3.0.0" }
napi-build = { version = "2" }
serde_json = { version = "1.0.145" }
anyhow = { version = "1.0.100" } 
clap = { version = "4.5.53" }
ctor = { version = "0.2" }

log = "0.4"
android_logger = { version = "0.13" }
mimalloc = "0.1.48"


[patch.crates-io]
# 오리지널
# ark-groth16 = { path = "vendor/ark-groth16-origin" }

# 최적화
ark-groth16 = { path = "vendor/ark-groth16-0.5.0" }
ark-relations = { path = "vendor/ark-relations-0.5.1" }

[profile.release]
lto = true
strip = "symbols"
panic = "abort"
