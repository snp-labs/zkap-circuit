name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        type: string

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Enforce main branch for manual dispatch
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "ERROR: Releases can only be triggered from the main branch."
          exit 1

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid version format: $VERSION (expected x.y.z)"
            exit 1
          fi

  test:
    name: Test
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2
        with:
          tool: cargo-nextest
      - run: cargo clippy --workspace -- -D warnings
      # Workspace `[profile.release]` is `panic = "abort"`, which Cargo does
      # not propagate to test binaries; `cargo test --release` therefore
      # hits a panic-strategy mismatch (deps=abort vs test crate=unwind)
      # and fails at link time. The root Cargo.toml defines a
      # `release-tests` profile (release optimization, LTO off, `panic = "unwind"`)
      # for exactly this reason — `ci.yml` already uses it. Mirror that
      # here so the tag-cut path test invocation matches the PR-side one.
      # zkap-witness-wasm is excluded here; it runs in `wasm-witness-tests`
      # on its own runner (mirrors ci.yml).
      - run: cargo nextest run --profile ci --cargo-profile release-tests --workspace --exclude zkap-witness-wasm

  wasm-witness-tests:
    # Split off from `test` (mirrors ci.yml). The wasm32 toolchain target
    # is needed because the wasm_to_prove tests rebuild zkap-witness-wasm
    # for wasm32-unknown-unknown inside the test fixture; the test itself
    # sets AR1CS_WITNESS_ARZKEY_PATH per-run.
    name: Test (zkap-witness-wasm)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --profile ci --cargo-profile release-tests -p zkap-witness-wasm

  generate-keys:
    # Phase 8 / P8-release-yml-symmetry (Phase 7 critic MINOR #4):
    # mirror the defence-in-depth guards from `ci.yml`'s
    # `generate-crs-smoke` job onto the tag-cut path that emits the
    # actual release artifacts. tag-cut is precisely where an
    # n,k-regression that explodes pk.arzkey would do the most damage
    # (release runner exhaustion, partial artifact upload), so the
    # guards belong here at least as much as on the PR-side smoke.
    # - `concurrency:` is keyed by (ref, shape) so a re-tagged release
    #   (or a `workflow_dispatch` re-trigger) cancels superseded runs
    #   per shape without the two matrix legs cancelling each other.
    # - `timeout-minutes:` is 30 to absorb the larger `tree_height=15`
    #   release shapes; PR-side smoke stays at the tighter 10-minute
    #   ceiling because it runs the smaller smoke shape only.
    # - The size cap on `output/keys` is a 2 GiB ceiling per shape.
    #   The committed release shapes (1-of-1 and 3-of-3) are well
    #   under this; the cap is a tripwire for a parameter regression
    #   blowing pk.arzkey past the runner disk budget.
    name: Generate Proving Keys (${{ matrix.shape }})
    needs: [test, wasm-witness-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shape:
          - 1-of-1
          - 3-of-3
    concurrency:
      group: generate-keys-${{ github.ref }}-${{ matrix.shape }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      # Phase 9 follow-up: replace generate_crs (legacy 6-file output) with
      # generate_setup (V1 7-file output incl. paired wasm). The wasm artifact
      # is required for the prove path; without it, the release tarball is
      # incomplete and consumers must build wasm separately (and end up with
      # a dummy-arzkey-paired wasm that aborts at runtime).
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install binaryen (wasm-opt)
        # ubuntu-latest does not ship binaryen by default. apt cache is
        # refreshed by the GitHub-hosted runner ~24h; package fetch is ~10s.
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Generate CRS + wasm bundle
        run: cargo run --release --features circuit/integration-tests
          --bin generate_setup --
          --config configs/release/${{ matrix.shape }}.json --output output/keys
          --circuit-id zkap-main-${{ matrix.shape }}

      - name: Verify pair contract
        # arzkey bytes 16..48 == wasm.embedded_ar1cs_blake3 (generate_setup
        # already prints the same hex to stdout, but we re-verify here for
        # release-path evidence).
        run: |
          set -euo pipefail
          ARZKEY_HEX=$(xxd -s 16 -l 32 -p output/keys/circuit.arzkey | tr -d '\n')
          test "${#ARZKEY_HEX}" -eq 64 || { echo "ERROR: arzkey blake3 length"; exit 1; }
          if ! LC_ALL=C grep -aFq "$(printf %s "${ARZKEY_HEX}" | xxd -r -p)" \
               output/keys/zkap_witness_wasm.opt.wasm; then
            echo "ERROR: wasm does not contain the arzkey ar1cs_blake3 bytes"
            exit 1
          fi
          echo "pair contract verified (ar1cs_blake3=${ARZKEY_HEX})"

      - name: CRS artifact size cap
        # 2 GiB (2 097 152 KiB) per-shape ceiling. Catches a parameter
        # blow-up here, before the upload-artifact step partially consumes
        # runner disk. Mirrors the guard `ci.yml` enforces on smoke output.
        run: |
          set -euo pipefail
          USED_KIB=$(du -sk output/keys | awk '{print $1}')
          LIMIT_KIB=2097152  # 2 GiB
          echo "output/keys total (${{ matrix.shape }}): ${USED_KIB} KiB / limit ${LIMIT_KIB} KiB"
          if [ "$USED_KIB" -gt "$LIMIT_KIB" ]; then
            echo "ERROR: output/keys exceeds 2 GiB cap (${USED_KIB} KiB > ${LIMIT_KIB} KiB)"
            exit 1
          fi

      - name: Upload keys
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: proving-keys-${{ matrix.shape }}
          path: output/keys/
          if-no-files-found: error

  release:
    name: Create Release
    needs: [validate, generate-keys]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/

      - name: Package shape bundles
        # Each matrix leg uploaded its `output/keys/` as
        # `proving-keys-<shape>`, so download-artifact placed them at
        # `artifacts/proving-keys-<shape>/`. Repack each into a single
        # `zkap-circuit-<shape>-v<version>.tar.gz` whose top-level
        # directory matches the archive stem — consumers get a
        # self-describing folder on extract.
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate.outputs.version }}"
          mkdir -p release-assets
          for shape in 1-of-1 3-of-3; do
            SRC="artifacts/proving-keys-${shape}"
            STEM="zkap-circuit-${shape}-v${VERSION}"
            test -d "${SRC}" || { echo "ERROR: missing ${SRC}"; exit 1; }
            mkdir -p "staging/${STEM}"
            cp -r "${SRC}/." "staging/${STEM}/"
            tar -czf "release-assets/${STEM}.tar.gz" -C staging "${STEM}"
            sha256sum "release-assets/${STEM}.tar.gz" \
              > "release-assets/${STEM}.tar.gz.sha256"
          done
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/*.tar.gz.sha256
