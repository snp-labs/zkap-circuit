name: wasm-perf

# PR-1b SLA gate for the witness-gen-wasm bench suite.
#
# Runs the criterion bench on PRs that touch the wasm32 witness
# generator and fails when any benchmark's measured mean exceeds the
# baseline in `crates/witness-gen-wasm/baseline.json` by more than the
# slack (default 10%, override with `SLACK_PCT` in the run step below
# if CI runner variance forces it).
#
# HOST PIN: baseline.json is calibrated for Apple-Silicon (M-series)
# hardware. GitHub Actions `macos-14` aliases to an M-class runner.
# Pinning here is intentional even though the rest of CI (ci.yml)
# runs on ubuntu-latest -- absolute time thresholds need the same
# host class as the baseline, otherwise we false-positive across the
# board. Cheaper alternatives (run on ubuntu + re-baseline + ratio
# gate) are tracked as a follow-up; v0.2 picks the simplest correct
# thing.
#
# Cost note: macOS runner minutes are 10x ubuntu. We mitigate by:
#   - paths-filter so the workflow only triggers when witness-gen-wasm
#     or its dep surface actually changes,
#   - aggressive Swatinem/rust-cache reuse,
#   - timeout-minutes cap.

on:
  push:
    branches: [main, develop]
    paths:
      - 'crates/witness-gen-wasm/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/wasm-perf.yml'
  pull_request:
    branches: [main, develop, "feature/**", "docs/**", "chore/**", "fix/**", "security/**", "refactor/**"]
    paths:
      - 'crates/witness-gen-wasm/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/wasm-perf.yml'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Bump to invalidate Swatinem/rust-cache when wasmtime / criterion
  # transitive dep updates leak stale cache entries.
  CACHE_BUST: "v1"

jobs:
  wasm-perf:
    name: wasm-perf SLA gate
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain (stable + wasm32 target)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          # Separate cache key from ci.yml because this workflow pulls in
          # wasmtime + criterion (heavy dev-deps) and runs on a different
          # OS/runner-class. Sharing the key would thrash both workflows.
          shared-key: wasm-perf-${{ env.CACHE_BUST }}

      - name: Build wasm32 cdylib
        # Prereq for both the parity test and the wasmtime bench axis --
        # both load this artifact at `target/wasm32-unknown-unknown/release/
        # zkap_witness_gen_wasm.wasm`.
        run: cargo build --target wasm32-unknown-unknown --release -p zkap-witness-gen-wasm

      - name: Parity test (rlib == wasmtime byte-identical)
        # IRON RULE regression guard. Runs before the bench so a parity
        # break aborts the job before we burn ~15 min of bench time.
        run: cargo test --release -p zkap-witness-gen-wasm --test parity

      - name: Run criterion bench
        # `cargo bench` inherits [profile.release]; passing --release
        # errors out ("unexpected argument '--release'"). Output is
        # buffered until completion -- normal, criterion writes
        # estimates.json incrementally to target/criterion/ which the
        # check script reads.
        run: cargo bench -p zkap-witness-gen-wasm

      - name: Check regression vs baseline.json
        # SLACK_PCT default comes from baseline.json itself; override
        # here only when runner-class variance demands it.
        env:
          SLACK_PCT: "10"
        run: python3 crates/witness-gen-wasm/scripts/check-regression.py

      - name: Upload criterion HTML report on failure
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4
        with:
          name: criterion-report-${{ github.sha }}
          path: target/criterion/
          retention-days: 14
          if-no-files-found: warn
