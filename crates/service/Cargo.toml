[package]
name = "zkpasskey-service"
version = "0.1.0"
edition = "2024"

[dependencies]
gadget = { workspace = true, default-features = false, features = ["crypto", "base64", "rsa"] }
circuit = { workspace = true }

thiserror = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }

ark-groth16           = { workspace = true }
ark-ec                = { workspace = true }
ark-ff                = { workspace = true }
ark-poly              = { workspace = true }
ark-r1cs-std          = { workspace = true }
ark-relations         = { workspace = true }
ark-std               = { workspace = true }
ark-crypto-primitives = { workspace = true }
ark-bn254             = { workspace = true }
ark-ed-on-bn254       = { workspace = true }
ark-serialize         = { workspace = true }
memmap2               = { workspace = true }
once_cell             = { workspace = true }

num         = { workspace = true }
num-integer = { workspace = true }
num-bigint  = { workspace = true }

# Logging
log = { workspace = true }
android_logger = { workspace = true }
num-traits  = { workspace = true }

blake2 = { workspace = true }
hex    = { workspace = true }
rand   = { workspace = true }
sha2   = { workspace = true }
jsonwebtoken = { workspace = true }

# mimalloc: musl(Alpine Linux)에서는 dlopen TLS 문제 해결을 위해 local_dynamic_tls 필요
[target.'cfg(target_env = "musl")'.dependencies]
mimalloc = { workspace = true, features = ["local_dynamic_tls"] }

[target.'cfg(not(target_env = "musl"))'.dependencies]
mimalloc = { workspace = true }

[features]
default = []
constraints-logging = ["gadget/constraints-logging", "circuit/constraints-logging"]