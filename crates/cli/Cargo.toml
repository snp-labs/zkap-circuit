[package]
name = "zkap-cli"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "CLI tools for ZK circuit CRS generation and hash computation"
repository = "https://github.com/snp-labs/zkap-circuit"

[dependencies]
circuit = { workspace = true }
zkap-service = { workspace = true }
ark-utils = { workspace = true, features = ["evm-codegen"] }

clap = { workspace = true, features = ["derive"] }
ark-serialize = { workspace = true }
ark-ff = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }
sha2 = { workspace = true }

[[bin]]
name = "generate_crs"
path = "src/bin/generate_crs.rs"

[[bin]]
name = "generate_hash"
path = "src/bin/generate_hash.rs"
