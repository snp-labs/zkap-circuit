[package]
name = "zkap-cli"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "CLI tools for ZK circuit CRS generation and hash computation"
repository = "https://github.com/snp-labs/zkap-circuit"

[dependencies]
circuit = { workspace = true }
gadget = { workspace = true, features = ["crypto", "base64", "rsa"] }
ark-utils = { workspace = true }

clap = { workspace = true, features = ["derive"] }
ark-serialize = { workspace = true }
ark-std = { workspace = true }
ark-bn254 = { workspace = true }
ark-ed-on-bn254 = { workspace = true }
ark-ff = { workspace = true }
ark-groth16 = { workspace = true }
ark-crypto-primitives = { workspace = true, features = ["snark", "crh"] }
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }

[features]
default = []
baerae = ["circuit/baerae"]
num-cs-logging = ["circuit/num-cs-logging"]

[[bin]]
name = "generate_baerae_crs"
path = "src/bin/generate_baerae_crs.rs"

[[bin]]
name = "generate_hash"
path = "src/bin/generate_hash.rs"
