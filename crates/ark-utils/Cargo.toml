[package]
name = "ark-utils"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "R1CS constraint system utilities for arkworks"
repository = "https://github.com/snp-labs/zkap-circuit"
keywords = ["zk", "arkworks", "r1cs", "constraints"]
categories = ["cryptography"]

[dependencies]
thiserror = { workspace = true }

ark-ff = { workspace = true }
ark-r1cs-std = { workspace = true }
ark-relations = { workspace = true }
ark-std = { workspace = true }
ark-serialize = { workspace = true }
ark-ec = { workspace = true }
hex = { workspace = true }

[dev-dependencies]
ark-bn254 = { workspace = true }

[features]
default = []
constraints-logging = []
